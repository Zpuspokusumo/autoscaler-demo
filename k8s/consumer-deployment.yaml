apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: autoscale-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
        - name: consumer
          image: consumer:latest
          imagePullPolicy: IfNotPresent

          # ADD THIS BLOCK:
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          # ... rest of env ...




          env:
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: TOPIC
              value: demo-topic
            - name: GROUP_ID
              value: demo-group
            - name: SLEEP_MS
              value: "300"
